name: profile

# Rebuilds banner.svg, langs.svg and the README's live sections from GitHub API data.
on:
  schedule:
    - cron: "23 5 * * *"          # daily, 05:23 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - scripts/**
      - .github/workflows/profile.yml

permissions:
  contents: write

concurrency:
  group: profile
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install fonttools

      - name: Rebuild profile
        working-directory: scripts
        env:
          # GH_PAT (repo scope) folds private repos into the aggregate stats.
          # Falls back to GITHUB_TOKEN (public data only) if the secret is absent.
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python build.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/banner.svg assets/langs.svg README.md
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "chore: auto-refresh profile [skip ci]"
            git push
          fi
